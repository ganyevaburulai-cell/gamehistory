<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тарых Каарманы</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #38bdf8;
            --danger: #ef4444;
            --success: #22c55e;
            --gold: #fbbf24;
        }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            background: var(--card);
            width: 90%;
            max-width: 450px;
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* Баштоо экраны */
        #start-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .logo-icon {
            font-size: 60px;
            margin-bottom: 10px;
        }

        h1 { margin: 0; color: var(--accent); font-size: 2rem; }

        .btn-main {
            background: var(--accent);
            color: var(--bg);
            border: none;
            padding: 16px 48px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.4);
        }

        .btn-main:hover {
            transform: scale(1.05);
            background: #7dd3fc;
        }

        /* Оюн экраны */
        #game-ui { display: none; }

        .header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            font-family: monospace;
            font-size: 1.1rem;
        }

        .timer-wrap {
            width: 100%;
            height: 6px;
            background: #334155;
            border-radius: 10px;
            margin-bottom: 30px;
        }

        #timer-bar {
            width: 100%;
            height: 100%;
            background: var(--success);
            border-radius: 10px;
        }

        .question {
            font-size: 1.25rem;
            min-height: 80px;
            margin-bottom: 20px;
        }

        .options {
            display: grid;
            gap: 12px;
        }

        .opt-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 14px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.2s;
        }

        .opt-btn:hover { background: rgba(255,255,255,0.15); border-color: var(--accent); }

        .correct { background: var(--success) !important; color: white; }
        .wrong { background: var(--danger) !important; color: white; }

        /* Аяктоо экраны */
        #end-screen { display: none; }
        .final-score { font-size: 4rem; color: var(--gold); margin: 20px 0; }

        /* Анимация */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        .shake { animation: shake 0.3s; }
    </style>
</head>
<body>

    <div class="container" id="main-box">
        <div id="start-screen">
            <div class="logo-icon">📜</div>
            <h1>Тарых Каарманы</h1>
            <p>Кыргыз тарыхы боюнча билимиңди сынап көр!</p>
            <button class="btn-main" onclick="startGame()">БАШТОО</button>
        </div>

        <div id="game-ui">
            <div class="header">
                <span id="score-val">Упай: 0</span>
                <span id="life-val" style="color: #ef4444;">❤️❤️❤️</span>
            </div>
            <div class="timer-wrap">
                <div id="timer-bar"></div>
            </div>
            <div class="question" id="q-text">Суроо жүктөлүүдө...</div>
            <div class="options" id="opt-box"></div>
        </div>

        <div id="end-screen">
            <h2>Оюн аяктады!</h2>
            <div class="final-score" id="res-score">0</div>
            <p id="res-msg"></p>
            <button class="btn-main" onclick="location.reload()">КАЙРАДАН</button>
        </div>
    </div>

<script>
    const database = [
        { q: "Кыргыз каганатынын негиздөөчүсү ким?", a: ["Барсбек", "Мукан", "Бумын"], c: 0 },
        { q: "Алай канышасы деп кимди аташкан?", a: ["Жаңыл Мырза", "Курманжан Датка", "Каншайым"], c: 1 },
        { q: "Жусуп Баласагындын белгилүү чыгармасы?", a: ["Куттуу билим", "Манас", "Диван Лугат"], c: 0 },
        { q: "Эң байыркы кыргыз шаары?", a: ["Бишкек", "Жалал-Абад", "Ош"], c: 2 },
        { q: "Кыргыз каганаты кайсы кылымда гүлдөгөн?", a: ["VI к.", "IX к.", "XV к."], c: 1 },
        { q: "Саймалуу-Таш кайсы жерде жайгашкан?", a: ["Нарын", "Ысык-Көл", "Жалал-Абад"], c: 2 },
        { q: "Кыргыз сому качан киргизилген?", a: ["1991", "1993", "1995"], c: 1 },
        { q: "Бурана мунарасы кайсы шаарга жакын?", a: ["Токмок", "Талас", "Ош"], c: 0 },
        { q: "Кыргыздар жөнүндө эң алгачкы маалымат кайсы элдин булагында?", a: ["Араб", "Кытай", "Перс"], c: 1 },
        { q: "1916-жылдагы окуя кандай аталат?", a: ["Революция", "Көтөрүлүш (Үркүн)", "Согуш"], c: 1 }
    ];

    let current = 0;
    let score = 0;
    let lives = 3;
    let timer;
    let timeScale = 100;

    function startGame() {
        document.getElementById("start-screen").style.display = "none";
        document.getElementById("game-ui").style.display = "block";
        loadQuestion();
    }

    function loadQuestion() {
        if (current >= database.length || lives <= 0) {
            showResult();
            return;
        }

        const q = database[current];
        document.getElementById("q-text").innerText = q.q;
        const box = document.getElementById("opt-box");
        box.innerHTML = "";

        q.a.forEach((txt, i) => {
            const btn = document.createElement("button");
            btn.className = "opt-btn";
            btn.innerText = txt;
            btn.onclick = () => check(i, btn);
            box.appendChild(btn);
        });

        runTimer();
    }

    function runTimer() {
        clearInterval(timer);
        timeScale = 100;
        const bar = document.getElementById("timer-bar");
        timer = setInterval(() => {
            timeScale -= 1;
            bar.style.width = timeScale + "%";
            if (timeScale <= 0) {
                clearInterval(timer);
                wrong();
            }
        }, 100); // 10 секунд
    }

    function check(idx, btn) {
        clearInterval(timer);
        const correct = database[current].c;
        const btns = document.querySelectorAll(".opt-btn");
        btns.forEach(b => b.style.pointerEvents = "none");

        if (idx === correct) {
            btn.classList.add("correct");
            score += Math.round(timeScale / 2) + 10;
            document.getElementById("score-val").innerText = "Упай: " + score;
        } else {
            btn.classList.add("wrong");
            btns[correct].classList.add("correct");
            wrong();
        }

        setTimeout(() => {
            current++;
            loadQuestion();
        }, 1200);
    }

    function wrong() {
        lives--;
        document.getElementById("main-box").classList.add("shake");
        setTimeout(() => document.getElementById("main-box").classList.remove("shake"), 300);
        document.getElementById("life-val").innerText = "❤️".repeat(lives) + "🖤".repeat(3 - lives);
        
        if (lives <= 0) {
            setTimeout(showResult, 800);
        } else if (timeScale <= 0) {
            current++;
            loadQuestion();
        }
    }

    function showResult() {
        document.getElementById("game-ui").style.display = "none";
        const end = document.getElementById("end-screen");
        end.style.display = "block";
        document.getElementById("res-score").innerText = score;
        document.getElementById("res-msg").innerText = score > 300 ? "Сиз чыныгы тарыхчысыз! 🏆" : "Жакшы, дагы аракет кылыңыз! 📚";
    }
</script>
</body>
</html>
